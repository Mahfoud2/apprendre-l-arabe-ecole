<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>تعلم العربية — Apprendre l'arabe</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.app{max-width:980px;margin:0 auto;padding:1rem}
.header{text-align:center;padding:.6rem 0}
.arabic-title{font-size:26px;color:#7F77DD;direction:rtl;letter-spacing:3px}
.header h1{font-size:18px;font-weight:500;color:#1a1a1a;margin-top:3px}
.level-bar{display:flex;gap:5px;margin-bottom:.9rem;overflow-x:auto;padding-bottom:2px}
.lvl-btn{flex:1;min-width:88px;padding:8px 5px;border-radius:12px;border:1px solid #ddd;background:#fff;cursor:pointer;text-align:center;transition:all .15s;position:relative}
.lvl-btn .li{font-size:15px;display:block}
.lvl-btn .ln{font-size:11px;font-weight:500;color:#666;margin-top:2px}
.lvl-btn .ll{font-size:10px;color:#999}
.lvl-btn.active{border-color:#7F77DD;background:#EEEDFE}
.lvl-btn.active .ln{color:#534AB7}
.lvl-btn.locked{opacity:.4;cursor:not-allowed}
.lico{position:absolute;top:4px;right:5px;font-size:10px}
.bn{position:absolute;bottom:3px;right:3px;font-size:9px;background:#FAC775;color:#633806;border-radius:5px;padding:1px 4px}
.lhdr{background:#fff;border-radius:12px;border:1px solid #eee;padding:.85rem 1rem;margin-bottom:.85rem;display:flex;align-items:center;gap:.85rem;flex-wrap:wrap}
.lbadge{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.linfo h2{font-size:14px;font-weight:500}
.linfo p{font-size:12px;color:#666;margin-top:1px}
.lprog{margin-left:auto;text-align:right}
.lprog .pct{font-size:17px;font-weight:500;color:#7F77DD}
.lprog .pctlbl{font-size:10px;color:#999}
.pbsm{height:4px;background:#eee;border-radius:2px;margin-top:3px;overflow:hidden;min-width:90px}
.pfsm{height:100%;background:#7F77DD;transition:width .3s}
.nav{display:flex;gap:4px;margin-bottom:.85rem;flex-wrap:wrap}
.nav-btn{padding:6px 12px;border-radius:16px;border:1px solid #ddd;background:#fff;font-size:12px;cursor:pointer;color:#666}
.nav-btn.active{background:#7F77DD;border-color:#7F77DD;color:white}
.section{display:none}.section.active{display:block}
.agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:6px;margin-bottom:.85rem}
.lcard{background:#fff;border:1px solid #eee;border-radius:12px;padding:9px 5px;text-align:center;cursor:pointer;transition:all .15s}
.lcard:hover,.lcard.sel{border-color:#AFA9EC;background:#EEEDFE}
.lar{font-size:27px;direction:rtl;line-height:1.2}
.lnm{font-size:10px;color:#999;margin-top:2px}
.ldet{background:#fff;border-radius:12px;border:1px solid #eee;padding:1rem;margin-bottom:.85rem}
.fbadge{background:#EEEDFE;color:#534AB7;border-radius:8px;padding:3px 8px;font-size:15px;direction:rtl}
.fcwrap{perspective:800px;margin:0 auto .85rem;max-width:370px;height:185px;cursor:pointer}
.fc{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s;border-radius:12px}
.fc.flipped{transform:rotateY(180deg)}
.cface{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:12px;border:1px solid #eee;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem}
.cfront{background:#fff}.cback{background:#EEEDFE;transform:rotateY(180deg)}
.cword{font-size:31px;direction:rtl;margin-bottom:5px}
.chint{font-size:11px;color:#999}
.ctrans{font-size:18px;font-weight:500;color:#534AB7}
.fcc{display:flex;gap:6px;justify-content:center;margin-bottom:.85rem;flex-wrap:wrap}
.fcc button{padding:6px 15px;border-radius:16px;border:1px solid #ddd;background:#fff;font-size:12px;cursor:pointer;color:#666}
.bknown{background:#EAF3DE!important;border-color:#639922!important;color:#3B6D11!important}
.bunknown{background:#FCEBEB!important;border-color:#E24B4A!important;color:#A32D2D!important}
.pb{height:4px;background:#eee;border-radius:2px;margin-bottom:.4rem;overflow:hidden}
.pf{height:100%;background:#7F77DD;transition:width .3s}
.mod-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.85rem}
.mtab{padding:5px 11px;border-radius:13px;border:1px solid #ddd;background:#fff;font-size:11px;cursor:pointer;color:#666;transition:all .15s}
.mtab.active{background:#534AB7;border-color:#534AB7;color:white}
.mtab.active.morpho{background:#D85A30;border-color:#D85A30}
.lesson-box{background:#fff;border-radius:12px;border:1px solid #eee;padding:1rem;margin-bottom:.85rem}
.lesson-box h3{font-size:14px;font-weight:500;margin-bottom:.55rem}
.rule-box{background:#EEEDFE;border-radius:8px;padding:.65rem .9rem;margin-bottom:.65rem;font-size:13px;color:#3C3489;border-left:3px solid #7F77DD;line-height:1.6}
.rule-box.morpho-rule{background:#FAECE7;color:#4A1B0C;border-left-color:#D85A30}
.ex-row{display:flex;align-items:center;gap:.65rem;padding:.35rem 0;border-bottom:1px solid #f0f0f0;flex-wrap:wrap}
.ex-row:last-child{border-bottom:none}
.ex-ar{font-size:19px;direction:rtl;min-width:95px}
.ex-tr{font-size:12px;color:#7F77DD;min-width:75px}
.ex-fr{font-size:13px;color:#666}
/* Quranic text box */
.quran-box{background:linear-gradient(135deg,#f8f4ff,#fff);border:1px solid #AFA9EC;border-radius:12px;padding:1rem 1.25rem;margin-bottom:.85rem;position:relative}
.quran-box .qb-badge{display:inline-block;font-size:10px;background:#7F77DD;color:white;border-radius:8px;padding:2px 8px;margin-bottom:.5rem}
.quran-box .qb-badge.hadith{background:#1D9E75}
.quran-box .qb-text{font-size:20px;direction:rtl;line-height:2;color:#1a1a1a;text-align:right;margin-bottom:.5rem}
.quran-box .qb-ref{font-size:11px;color:#7F77DD;text-align:right}
.quran-box .qb-trans{font-size:13px;color:#666;font-style:italic;margin-top:.4rem;line-height:1.5}
.highlight{background:#FAC775;border-radius:3px;padding:0 3px;color:#633806;font-weight:500}
.g-ex{background:#fff;border-radius:12px;border:1px solid #eee;padding:1rem;margin-bottom:.65rem}
.g-ex h4{font-size:13px;font-weight:500;margin-bottom:.65rem}
.g-q{font-size:14px;margin-bottom:.65rem;line-height:1.6;color:#1a1a1a}
.g-q .ar{direction:rtl;font-size:18px;display:block;margin:.4rem 0;color:#3C3489}
.g-opts{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.4rem}
.g-opt{padding:5px 13px;border-radius:13px;border:1px solid #ddd;background:#f5f5f0;cursor:pointer;font-size:13px;transition:all .15s;color:#1a1a1a}
.g-opt:hover:not(:disabled){background:#EEEDFE;border-color:#AFA9EC}
.g-opt.correct{background:#EAF3DE;border-color:#639922;color:#3B6D11}
.g-opt.wrong{background:#FCEBEB;border-color:#E24B4A;color:#A32D2D}
.g-fb{font-size:12px;margin-top:.35rem;min-height:15px;color:#666;line-height:1.5}
.gscore-row{display:flex;gap:7px;align-items:center;margin-bottom:.65rem;flex-wrap:wrap}
.gsbadge{border-radius:11px;padding:3px 11px;font-size:12px;font-weight:500}
.gsbadge.gram{background:#EEEDFE;color:#534AB7}
.gsbadge.morph{background:#FAECE7;color:#993C1D}
.next-btn{padding:5px 14px;border-radius:14px;border:1px solid #7F77DD;background:white;color:#534AB7;font-size:12px;cursor:pointer}
.root-display{text-align:center;margin-bottom:1rem}
.root-letters{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:10px 0}
.root-letter{width:52px;height:52px;border-radius:12px;border:2px solid #D85A30;background:#FAECE7;display:flex;flex-direction:column;align-items:center;justify-content:center}
.root-letter .rl-ar{font-size:24px;color:#993C1D;direction:rtl}
.root-letter .rl-num{font-size:10px;color:#BA7517}
.wazn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px;margin:10px 0}
.wazn-card{background:#fff;border:1px solid #eee;border-radius:12px;padding:.65rem .85rem;cursor:pointer;transition:all .15s}
.wazn-card:hover,.wazn-card.wsel{border-color:#F0997B;background:#FAECE7}
.wazn-card .wpattern{font-size:18px;direction:rtl;color:#993C1D;font-weight:500}
.wazn-card .wlabel{font-size:11px;color:#999;margin-top:2px}
.wazn-card .wexample{font-size:14px;direction:rtl;margin-top:3px}
.deriv-table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px}
.deriv-table th{background:#FAECE7;color:#993C1D;padding:5px 8px;font-weight:500;text-align:center;border:1px solid #F0997B}
.deriv-table td{padding:5px 8px;border:1px solid #eee;text-align:center}
.deriv-table td.ar-cell{font-size:17px;direction:rtl;color:#3C3489}
.deriv-table tr:hover td{background:#fafafa}
.qscore{display:flex;gap:6px;margin-bottom:.85rem}
.qsi{background:#f5f5f0;border-radius:8px;padding:6px;font-size:11px;color:#666;flex:1;text-align:center}
.qsn{font-size:16px;font-weight:500;color:#1a1a1a;display:block}
.qcard{background:#fff;border-radius:12px;border:1px solid #eee;padding:1rem;margin-bottom:.65rem}
.qq{font-size:20px;text-align:center;margin-bottom:1rem}
.qopts{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.qopt{padding:8px;border-radius:8px;border:1px solid #ddd;background:#f5f5f0;cursor:pointer;font-size:13px;text-align:center;transition:all .15s}
.qopt:hover:not(:disabled){border-color:#AFA9EC;background:#EEEDFE}
.qopt.correct{background:#EAF3DE;border-color:#639922;color:#3B6D11}
.qopt.wrong{background:#FCEBEB;border-color:#E24B4A;color:#A32D2D}
.lockoverlay{text-align:center;padding:2rem 1rem;background:#fff;border-radius:12px;border:1px solid #eee}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(100px);background:#534AB7;color:white;padding:9px 20px;border-radius:16px;font-size:13px;transition:transform .4s;z-index:99;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="arabic-title">تعلم العربية</div>
    <h1>Apprentissage de l'arabe — 5 niveaux</h1>
  </div>
  <div class="level-bar" id="levelBar"></div>
  <div class="lhdr" id="levelHeader"></div>
  <nav class="nav">
    <button class="nav-btn active" onclick="showSection('alphabet',this)">🔤 Alphabet</button>
    <button class="nav-btn" onclick="showSection('vocab',this)">📚 Vocabulaire</button>
    <button class="nav-btn" onclick="showSection('grammar',this)">📝 Grammaire</button>
    <button class="nav-btn" onclick="showSection('morpho',this)">🔬 Morphologie</button>
    <button class="nav-btn" onclick="showSection('quiz',this)">✏️ Quiz</button>
  </nav>
  <div class="section active" id="alphabet"></div>
  <div class="section" id="vocab"></div>
  <div class="section" id="grammar"></div>
  <div class="section" id="morpho"></div>
  <div class="section" id="quiz"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const LEVELS=[
{id:0,name:'Débutant',label:'Niveau 1',icon:'🌱',color:'#1D9E75',bg:'#E1F5EE',desc:'Alphabet, salutations, premiers mots',unlockScore:80,
alphabet:[{ar:'ا',name:'Alif',trans:'a',forms:['أ','إ','آ']},{ar:'ب',name:'Ba',trans:'b',forms:['بـ','ـبـ','ـب']},{ar:'ت',name:'Ta',trans:'t',forms:['تـ','ـتـ','ـت']},{ar:'ج',name:'Jim',trans:'dj',forms:['جـ','ـجـ','ـج']},{ar:'د',name:'Dal',trans:'d',forms:['ـد']},{ar:'ر',name:'Ra',trans:'r',forms:['ـر']},{ar:'س',name:'Sin',trans:'s',forms:['سـ','ـسـ','ـس']},{ar:'م',name:'Mim',trans:'m',forms:['مـ','ـمـ','ـم']},{ar:'ن',name:'Nun',trans:'n',forms:['نـ','ـنـ','ـن']},{ar:'و',name:'Waw',trans:'w',forms:['ـو']}],
vocab:[{ar:'مرحبا',fr:'Bonjour'},{ar:'شكرا',fr:'Merci'},{ar:'نعم',fr:'Oui'},{ar:'لا',fr:'Non'},{ar:'أنا',fr:'Je / Moi'},{ar:'ماء',fr:'Eau'},{ar:'خبز',fr:'Pain'},{ar:'واحد',fr:'Un'},{ar:'اثنان',fr:'Deux'},{ar:'ثلاثة',fr:'Trois'}],
grammar:[
{title:"L'article défini ال",rule:"ال (al-) est l'article défini unique en arabe. Il se place avant le nom. Un nom sans article est indéfini. La lune (الشمسية) ou le soleil (القمرية) influencent la prononciation du ل.",
examples:[{ar:'رَبٌّ',trans:'rabb',fr:'un seigneur (indéfini)'},{ar:'الرَّبُّ',trans:'ar-rabb',fr:'le Seigneur (défini)'},{ar:'كِتَابٌ',trans:'kitāb',fr:'un livre'},{ar:'الكِتَابُ',trans:'al-kitāb',fr:'le livre'}],
quranRef:{type:'quran',text:'بِسْمِ اللهِ الرَّحْمَٰنِ الرَّحِيمِ',ref:'Sourate Al-Fatiha, 1:1',trans:'Au nom de Dieu, le Tout Miséricordieux, le Très Miséricordieux',highlight:'الرَّحْمَٰنِ الرَّحِيمِ',highlightNote:'Les deux noms portent ال → noms définis'},
exercises:[
{q:'Dans بِسْمِ اللهِ, quel mot porte l\'article ال ?',ar:'بِسْمِ اللهِ',opts:['بِسْمِ','اللهِ','بِ','ال'],answer:'اللهِ',explain:'اللَّه porte ال → "le Dieu" = Dieu (défini)'},
{q:'Ajoute ال devant رَبٌّ (seigneur) :',ar:'',opts:['الرَّبُّ','رَبُّال','رَبٌّ','الاربّ'],answer:'الرَّبُّ',explain:'Al + rabb = الرَّبُّ'},
{q:'Dans الرَّحْمَٰنِ, le ال indique que ce nom est… ?',ar:'الرَّحْمَٰنِ',opts:['indéfini','défini','pluriel','féminin'],answer:'défini',explain:'ال = article défini → "le Tout Miséricordieux"'}
]},
{title:'Genre : masculin et féminin',rule:'Le féminin porte souvent ة (ta marbuta). Les noms divins et les adjectifs s\'accordent. Certains noms féminins n\'ont pas de ة (ex: أرض = terre, نار = feu).',
examples:[{ar:'مُؤْمِنٌ',trans:'muʾmin',fr:'croyant (masc.)'},{ar:'مُؤْمِنَةٌ',trans:'muʾmina',fr:'croyante (fém.)'},{ar:'رَحْمَةٌ',trans:'raḥma',fr:'miséricorde (fém.)'},{ar:'نَارٌ',trans:'nār',fr:'feu (fém. sans ة)'}],
quranRef:{type:'quran',text:'وَرَحْمَتِي وَسِعَتْ كُلَّ شَيْءٍ',ref:'Sourate Al-Aʿrāf, 7:156',trans:'Et Ma miséricorde embrasse toute chose',highlight:'رَحْمَتِي',highlightNote:'رحمة porte ة → féminin'},
exercises:[
{q:'رَحْمَةٌ (miséricorde) est féminin car… ?',ar:'رَحْمَةٌ',opts:['il porte ة','il est court','il est défini','il est pluriel'],answer:'il porte ة',explain:'La ta marbuta ة est la marque du féminin'},
{q:'Quel mot est féminin ?',ar:'',opts:['كِتَابٌ','مُؤْمِنٌ','رَحْمَةٌ','رَبٌّ'],answer:'رَحْمَةٌ',explain:'رحمة porte ة → féminin'},
{q:'Forme le féminin de مُؤْمِنٌ (croyant) :',ar:'',opts:['مُؤْمِنَةٌ','مُؤْمِنِي','مُؤْمِنُون','مَؤْمَن'],answer:'مُؤْمِنَةٌ',explain:'On ajoute ة → مُؤْمِنَة'}
]},
{title:'La phrase à préposition : حرف الجر',rule:'Les prépositions (حروف الجر) les plus courantes : بِ (par/avec/au nom de), لِ (pour/à), فِي (dans), عَلَى (sur), مِن (de), إِلَى (vers). Elles mettent le nom suivant au génitif (ـِ).',
examples:[{ar:'بِسْمِ اللهِ',trans:'bismi-llāh',fr:'au nom de Dieu'},{ar:'لِلَّهِ',trans:'li-llāh',fr:'pour Dieu / à Dieu'},{ar:'فِي السَّمَاءِ',trans:'fi s-samāʾ',fr:'dans le ciel'},{ar:'مِنَ اللهِ',trans:'mina-llāh',fr:'de Dieu'}],
quranRef:{type:'hadith',text:'إِنَّمَا الأَعْمَالُ بِالنِّيَّاتِ',ref:'Hadith, Sahih al-Bukhari n°1',trans:'Les actes ne valent que par les intentions',highlight:'بِالنِّيَّاتِ',highlightNote:'بِ = préposition "par/avec", النيات = les intentions (génitif)'},
exercises:[
{q:'Dans بِسْمِ اللهِ, بِ est une… ?',ar:'بِسْمِ اللهِ',opts:['préposition','pronom','verbe','article'],answer:'préposition',explain:'بِ = "au nom de / par", c\'est une préposition (حرف جر)'},
{q:'Dans بِالنِّيَّاتِ, la préposition بِ signifie ?',ar:'بِالنِّيَّاتِ',opts:['dans','vers','par/avec','de'],answer:'par/avec',explain:'بِ = par/avec → "par les intentions"'},
{q:'Quelle préposition signifie "dans" ?',ar:'',opts:['بِ','لِ','فِي','مِن'],answer:'فِي',explain:'فِي = dans → فِي السَّمَاء = dans le ciel'}
]},
{title:'Le nom indéfini et le tanwīn',rule:'En arabe, le tanwīn (تنوين) est la double voyelle finale (ـٌ, ـً, ـٍ) qui marque l\'indétermination. ـٌ = nominatif, ـً = accusatif, ـٍ = génitif indéfini. Il n\'y a pas de mot "un/une" en arabe.',
examples:[{ar:'رَجُلٌ',trans:'rajulun',fr:'un homme (nominatif indef.)'},{ar:'رَجُلاً',trans:'rajulan',fr:'un homme (accusatif indef.)'},{ar:'رَجُلٍ',trans:'rajulin',fr:'d\'un homme (génitif indef.)'},{ar:'كُلَّ شَيْءٍ',trans:'kulla shayʾin',fr:'toute chose (génitif indef.)'}],
quranRef:{type:'quran',text:'وَخَلَقْنَا كُلَّ شَيْءٍ مِّن مَّاءٍ',ref:'Sourate Al-Anbiyāʾ, 21:30',trans:'Et Nous avons créé toute chose à partir de l\'eau',highlight:'شَيْءٍ مَّاءٍ',highlightNote:'شيءٍ et ماءٍ portent ـٍ = génitif indéfini'},
exercises:[
{q:'شَيْءٍ porte ـٍ, ce qui indique… ?',ar:'وَخَلَقْنَا كُلَّ شَيْءٍ',opts:['défini','génitif indéfini','nominatif','pluriel'],answer:'génitif indéfini',explain:'ـٍ = tanwīn kasra = génitif indéfini'},
{q:'Comment rendre رَجُلٌ indéfini à l\'accusatif ?',ar:'',opts:['رَجُلٌ','رَجُلاً','الرَّجُلُ','رَجُلٍ'],answer:'رَجُلاً',explain:'ـً = tanwīn fatḥa = accusatif indéfini'},
{q:'Le tanwīn sert à marquer… ?',ar:'',opts:['le féminin','le pluriel','l\'indétermination','le verbe'],answer:'l\'indétermination',explain:'Les doubles voyelles finales (ـٌ ـً ـٍ) = tanwīn = indéfini'}
]},
{title:'L\'annexion : الإضافة',rule:'L\'idafa (إضافة) est la construction possessive. On juxtapose deux noms : le premier (مضاف) perd son tanwīn, le second (مضاف إليه) se met au génitif. Traduit par "de" en français.',
examples:[{ar:'كِتَابُ اللهِ',trans:'kitābu-llāh',fr:'le Livre de Dieu'},{ar:'رَسُولُ اللهِ',trans:'rasūlu-llāh',fr:'le Messager de Dieu'},{ar:'بَيْتُ الرَّجُلِ',trans:'baytu r-rajul',fr:'la maison de l\'homme'},{ar:'نُورُ السَّمَاءِ',trans:'nūru s-samāʾ',fr:'la lumière du ciel'}],

{title:'L\'emphase et la mise en valeur : أسلوب التوكيد',rule:'L\'arabe possède plusieurs procédés d\'emphase : إِنَّ (emphase nominale), لَقَد (emphase verbale au passé), لَـ + présent (serment), التوكيد اللفظي (répétition), التوكيد المعنوي (نَفس, عَين, كِلا, كُلّ).',

quranRef:{type:'quran',text:'وَلَقَدْ كَرَّمْنَا بَنِي آدَمَ وَحَمَلْنَاهُمْ فِي الْبَرِّ وَالْبَحْرِ',ref:'Sourate Al-Isrāʾ, 17:70',trans:'Nous avons certes honoré les fils d\'Adam, les portant sur terre et sur mer',highlight:'وَلَقَدْ كَرَّمْنَا',highlightNote:'لَقَد = emphase du passé (lām + qad) : "nous avons certes / vraiment honoré"'},

{title:'La rhétorique coranique : أسلوب الاستفهام الإنكاري',rule:'L\'interrogation rhétorique (الاستفهام الإنكاري) pose une question dont la réponse est évidente. Elle n\'attend pas de réponse mais renforce un jugement. Les particules : أَ، هَل، أَلَيسَ، أَوَلَم.',

let cLvl=0,scores=[100,0,0,0,0],unlocked=[true,false,false,false,false];
let fcIdx=0,knownCards=new Set(),qC=0,qT=0;
let gTop=0,gExI=0,gSc=0,gTot=0,mTop=0,mExI=0,mSc=0,mTot=0;
let curSec='alphabet',curAns='';

try{const u=localStorage.getItem('ar5_unl');if(u)unlocked=JSON.parse(u);}catch(e){}
try{const s=localStorage.getItem('ar5_sc');if(s)scores=JSON.parse(s);}catch(e){}
function save(){try{localStorage.setItem('ar5_unl',JSON.stringify(unlocked));localStorage.setItem('ar5_sc',JSON.stringify(scores));}catch(e){}}

function renderLevelBar(){
  document.getElementById('levelBar').innerHTML=LEVELS.map((l,i)=>{
    const lk=!unlocked[i],ac=i===cLvl;
    return '<button class="lvl-btn'+(ac?' active':'')+(lk?' locked':'')+'" onclick="'+(lk?'showLockMsg('+i+')':'selectLevel('+i+')')+'" style="'+(ac?'border-color:'+l.color:'')+'">'+(lk?'<span class="lico">🔒</span>':'')+'<span class="li">'+l.icon+'</span><div class="ln" style="'+(ac?'color:'+l.color:'')+'">'+l.name+'</div><div class="ll">'+l.label+'</div>'+(lk&&i>0?'<div class="bn">'+LEVELS[i-1].unlockScore+'%</div>':'')+'</button>';
  }).join('');
}
function renderLevelHeader(){
  const l=LEVELS[cLvl],p=scores[cLvl]||0;
  document.getElementById('levelHeader').innerHTML='<div class="lbadge" style="background:'+l.bg+'">'+l.icon+'</div><div class="linfo"><h2>'+l.label+' — '+l.name+'</h2><p>'+l.desc+'</p></div><div class="lprog"><div class="pct">'+p+'%</div><div class="pctlbl">Score quiz</div><div class="pbsm"><div class="pfsm" style="width:'+p+'%;background:'+l.color+'"></div></div></div>';
}
function selectLevel(i){
  if(!unlocked[i])return;
  cLvl=i;fcIdx=0;knownCards.clear();qC=0;qT=0;gTop=0;gExI=0;gSc=0;gTot=0;mTop=0;mExI=0;mSc=0;mTot=0;
  renderLevelBar();renderLevelHeader();showSection(curSec,null);
}
function showLockMsg(i){showToast('🔒 Obtenez '+LEVELS[i-1].unlockScore+'% au quiz du niveau '+i+' (actuel : '+(scores[i-1]||0)+'%)');}
function showSection(id,btn){
  curSec=id;
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  if(btn){document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');}
  if(!unlocked[cLvl]){
    var prev=cLvl-1,nd=LEVELS[prev]?LEVELS[prev].unlockScore||80:80,cu=scores[prev]||0;
    document.getElementById(id).innerHTML='<div class="lockoverlay"><div style="font-size:38px;margin-bottom:.65rem">🔒</div><h3 style="font-size:14px;font-weight:500;margin-bottom:4px">Niveau verrouillé</h3><p style="font-size:12px;color:#666">Obtenez '+nd+'% au quiz du Niveau '+cLvl+'.<br>Score actuel : <strong>'+cu+'%</strong></p></div>';
    return;
  }
  if(id==='alphabet')renderAlphabet();
  else if(id==='vocab'){fcIdx=0;knownCards.clear();renderVocab();}
  else if(id==='grammar'){gTop=0;gExI=0;gSc=0;gTot=0;renderGrammar();}
  else if(id==='morpho'){mTop=0;mExI=0;mSc=0;mTot=0;renderMorpho();}
  else if(id==='quiz'){qC=0;qT=0;renderQuiz();}
}

function renderAlphabet(){
  var el=document.getElementById('alphabet'),lt=LEVELS[cLvl].alphabet;
  el.innerHTML='<div class="agrid">'+lt.map(function(l,i){return '<div class="lcard" onclick="showLetter('+i+')"><div class="lar">'+l.ar+'</div><div class="lnm">'+l.name+'</div><div class="lnm" style="color:#7F77DD">'+l.trans+'</div></div>';}).join('')+'</div><div id="lDet"></div>';
}
function showLetter(i){
  var l=LEVELS[cLvl].alphabet[i];
  document.querySelectorAll('.lcard').forEach(function(c,j){c.classList.toggle('sel',j===i);});
  document.getElementById('lDet').innerHTML='<div class="ldet"><div style="display:flex;align-items:center;gap:.85rem;flex-wrap:wrap"><div style="font-size:54px;direction:rtl;color:#534AB7;line-height:1">'+l.ar+'</div><div><div style="font-size:14px;font-weight:500">'+l.name+'</div><div style="font-size:12px;color:#666">Translittération : <strong>'+l.trans+'</strong></div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">'+l.forms.map(function(f){return '<div class="fbadge">'+f+'</div>';}).join('')+'</div></div></div></div>';
}

function renderVocab(){
  var el=document.getElementById('vocab'),v=LEVELS[cLvl].vocab;
  el.innerHTML='<div class="pb"><div class="pf" id="pf" style="width:0%"></div></div><p style="font-size:11px;color:#999;text-align:center;margin-bottom:.65rem" id="fcc">Carte 1/'+v.length+'</p><div class="fcwrap" onclick="flipCard()"><div class="fc" id="fc"><div class="cface cfront"><div class="cword" id="cw"></div><div class="chint">Cliquez pour la traduction</div></div><div class="cface cback"><div class="ctrans" id="ct"></div></div></div></div><div class="fcc"><button class="bunknown" onclick="rateCard(false)">✗ À revoir</button><button onclick="flipCard()">↩ Retourner</button><button class="bknown" onclick="rateCard(true)">✓ Connu</button></div>';
  updateFC();
}
function updateFC(){
  var v=LEVELS[cLvl].vocab,it=v[fcIdx];
  document.getElementById('cw').textContent=it.ar;
  document.getElementById('ct').textContent=it.fr;
  document.getElementById('fc').classList.remove('flipped');
  document.getElementById('fcc').textContent='Carte '+(fcIdx+1)+'/'+v.length+' — Maîtrisées : '+knownCards.size;
  document.getElementById('pf').style.width=(knownCards.size/v.length*100)+'%';
}
function flipCard(){document.getElementById('fc').classList.toggle('flipped');}
function rateCard(k){if(k)knownCards.add(fcIdx);fcIdx=(fcIdx+1)%LEVELS[cLvl].vocab.length;updateFC();}

function buildQuranBox(ref){
  if(!ref)return'';
  var badge=ref.type==='quran'?'📖 Quran':'🕌 Hadith';
  var cls=ref.type==='quran'?'':'hadith';
  var textHtml=ref.text;
  if(ref.highlight){
    ref.highlight.split(' ').forEach(function(w){
      if(w)textHtml=textHtml.split(w).join('<span class="highlight">'+w+'</span>');
    });
  }
  return '<div class="quran-box"><span class="qb-badge '+cls+'">'+badge+'</span><div class="qb-text">'+textHtml+'</div><div class="qb-ref">'+ref.ref+'</div><div class="qb-trans">'+ref.trans+'</div>'+(ref.highlightNote?'<div style="font-size:11px;color:#534AB7;margin-top:.4rem;border-top:1px solid #eee;padding-top:.35rem">ℹ️ '+ref.highlightNote+'</div>':'')+'</div>';
}

function renderGrammar(){
  var el=document.getElementById('grammar'),topics=LEVELS[cLvl].grammar;
  if(!topics||!topics.length){el.innerHTML='<div style="padding:2rem;text-align:center;color:#999">Aucun contenu.</div>';return;}
  var t=topics[gTop];
  var tabs=topics.map(function(tp,i){return '<button class="mtab'+(i===gTop?' active':'')+'" onclick="selGTop('+i+')">'+tp.title.substring(0,25)+'</button>';}).join('');
  var exHtml=buildGEx(t,t.exercises[gExI]);
  el.innerHTML=
    '<div class="mod-tabs">'+tabs+'</div>'+
    '<div class="lesson-box"><h3>'+t.title+'</h3>'+
    '<div class="rule-box">'+t.rule+'</div>'+
    t.examples.map(function(e){return '<div class="ex-row"><div class="ex-ar">'+e.ar+'</div><div class="ex-tr">'+e.trans+'</div><div class="ex-fr">'+e.fr+'</div></div>';}).join('')+
    '</div>'+
    buildQuranBox(t.quranRef)+
    '<div class="gscore-row"><span style="font-size:12px;color:#666">Exercices :</span><span class="gsbadge gram" id="gsbg">'+gSc+'/'+gTot+' — Q.'+(gExI+1)+'/'+t.exercises.length+'</span></div>'+
    '<div id="gExArea">'+exHtml+'</div>';
}
function buildGEx(t,ex){
  if(!ex)return'<div style="text-align:center;padding:1.25rem;color:#1D9E75;font-size:13px">✓ Score : '+gSc+'/'+gTot+' <button class="next-btn" onclick="resetG()">Recommencer</button></div>';
  var arLine=ex.ar?'<span class="ar">'+ex.ar+'</span>':'';
  var opts=ex.opts.map(function(o){
    var safe=o.replace(/\\/g,'\\\\').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
    return '<button class="g-opt" onclick="checkG(this,\''+safe+'\')">'+o+'</button>';
  }).join('');
  return '<div class="g-ex"><h4>Question '+(gExI+1)+'/'+t.exercises.length+'</h4><div class="g-q">'+ex.q+arLine+'</div><div class="g-opts">'+opts+'</div><div class="g-fb" id="gfb"></div></div>';
}
function selGTop(i){gTop=i;gExI=0;gSc=0;gTot=0;renderGrammar();}
function resetG(){gExI=0;gSc=0;gTot=0;renderGrammar();}
function checkG(btn,ans){
  var t=LEVELS[cLvl].grammar[gTop],ex=t.exercises[gExI];
  document.querySelectorAll('#grammar .g-opt').forEach(function(b){b.disabled=true;});
  gTot++;
  if(ans===ex.answer){btn.classList.add('correct');gSc++;document.getElementById('gfb').innerHTML='<span style="color:#3B6D11">✓ '+ex.explain+'</span>';}
  else{btn.classList.add('wrong');document.querySelectorAll('#grammar .g-opt').forEach(function(b){if(b.textContent===ex.answer)b.classList.add('correct');});document.getElementById('gfb').innerHTML='<span style="color:#A32D2D">✗ '+ex.explain+'</span>';}
  document.getElementById('gsbg').textContent=gSc+'/'+gTot+' — Q.'+(gExI+1)+'/'+t.exercises.length;
  setTimeout(function(){
    gExI++;
    if(gExI>=t.exercises.length){document.getElementById('gExArea').innerHTML='<div style="text-align:center;padding:1.25rem;color:#1D9E75;font-size:13px">✓ Score : '+gSc+'/'+gTot+' <button class="next-btn" onclick="resetG()">Recommencer</button></div>';return;}
    renderGrammar();
  },1600);
}

function renderMorpho(){
  var el=document.getElementById('morpho'),topics=LEVELS[cLvl].morpho;
  if(!topics||!topics.length){el.innerHTML='<div style="padding:2rem;text-align:center;color:#999">Aucun contenu.</div>';return;}
  var t=topics[mTop];var root=t.rootExample;
  var tabs=topics.map(function(tp,i){return '<button class="mtab'+(i===mTop?' active morpho':'')+'" onclick="selMTop('+i+')">'+tp.title.substring(0,28)+'</button>';}).join('');
  var rootHtml='<div class="root-display"><div style="font-size:12px;color:#666;margin-bottom:6px">Racine — '+root.meaning+'</div><div class="root-letters">'+root.root.map(function(l,i){return '<div class="root-letter"><div class="rl-ar">'+l+'</div><div class="rl-num">'+['ف','ع','ل'][i]+'</div></div>';}).join('')+'</div></div>';
  var waznHtml='<div style="font-size:12px;font-weight:500;color:#993C1D;margin-bottom:6px">Schèmes (أوزان) :</div><div class="wazn-grid">'+t.waznGrid.map(function(w,i){return '<div class="wazn-card" onclick="selectWazn('+i+')"><div class="wpattern">'+w.pattern+'</div><div class="wlabel">'+w.label+'</div><div class="wexample">'+w.example+' — <span style="font-size:12px;color:#666">'+w.meaning+'</span></div></div>';}).join('')+'</div>';
  var derivHtml='<div style="font-size:12px;font-weight:500;color:#993C1D;margin:10px 0 6px">Tableau de dérivation :</div><table class="deriv-table"><thead><tr><th>Forme arabe</th><th>Schème (وزن)</th><th>Type</th><th>Traduction</th></tr></thead><tbody>'+t.derivTable.map(function(r){return '<tr><td class="ar-cell">'+r.forme+'</td><td class="ar-cell" style="font-size:14px;color:#993C1D">'+r.schème+'</td><td style="font-size:12px">'+r.type+'</td><td style="font-size:12px;color:#666">'+r.fr+'</td></tr>';}).join('')+'</tbody></table>';
  var exHtml=buildMEx(t,t.exercises[mExI]);
  el.innerHTML=
    '<div class="mod-tabs">'+tabs+'</div>'+
    '<div class="lesson-box"><h3>'+t.title+'</h3><div class="rule-box morpho-rule">'+t.rule+'</div>'+rootHtml+waznHtml+derivHtml+'</div>'+
    buildQuranBox(t.quranRef)+
    '<div class="gscore-row"><span style="font-size:12px;color:#666">Exercices morphologie :</span><span class="gsbadge morph" id="msbg">'+mSc+'/'+mTot+' — Q.'+(mExI+1)+'/'+t.exercises.length+'</span></div>'+
    '<div id="mExArea">'+exHtml+'</div>';
}
function buildMEx(t,ex){
  if(!ex)return'<div style="text-align:center;padding:1.25rem;color:#1D9E75;font-size:13px">✓ Score : '+mSc+'/'+mTot+' <button class="next-btn" onclick="resetM()">Recommencer</button></div>';
  var arLine=ex.ar?'<span class="ar">'+ex.ar+'</span>':'';
  var opts=ex.opts.map(function(o){
    var safe=o.replace(/\\/g,'\\\\').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
    return '<button class="g-opt" onclick="checkM(this,\''+safe+'\')">'+o+'</button>';
  }).join('');
  return '<div class="g-ex"><h4>Question morphologie '+(mExI+1)+'/'+t.exercises.length+'</h4><div class="g-q">'+ex.q+arLine+'</div><div class="g-opts">'+opts+'</div><div class="g-fb" id="mfb"></div></div>';
}
function selMTop(i){mTop=i;mExI=0;mSc=0;mTot=0;renderMorpho();}
function resetM(){mExI=0;mSc=0;mTot=0;renderMorpho();}
function selectWazn(i){document.querySelectorAll('.wazn-card').forEach(function(c,j){c.classList.toggle('wsel',j===i);});}
function checkM(btn,ans){
  var t=LEVELS[cLvl].morpho[mTop],ex=t.exercises[mExI];
  document.querySelectorAll('#morpho .g-opt').forEach(function(b){b.disabled=true;});
  mTot++;
  if(ans===ex.answer){btn.classList.add('correct');mSc++;document.getElementById('mfb').innerHTML='<span style="color:#3B6D11">✓ '+ex.explain+'</span>';}
  else{btn.classList.add('wrong');document.querySelectorAll('#morpho .g-opt').forEach(function(b){if(b.textContent===ex.answer)b.classList.add('correct');});document.getElementById('mfb').innerHTML='<span style="color:#A32D2D">✗ '+ex.explain+'</span>';}
  document.getElementById('msbg').textContent=mSc+'/'+mTot+' — Q.'+(mExI+1)+'/'+t.exercises.length;
  setTimeout(function(){
    mExI++;
    if(mExI>=t.exercises.length){document.getElementById('mExArea').innerHTML='<div style="text-align:center;padding:1.25rem;color:#1D9E75;font-size:13px">✓ Score : '+mSc+'/'+mTot+' <button class="next-btn" onclick="resetM()">Recommencer</button></div>';return;}
    renderMorpho();
  },1600);
}

function renderQuiz(){
  var el=document.getElementById('quiz');
  el.innerHTML='<div class="qscore"><div class="qsi"><span class="qsn" id="qsC">0</span>Correct</div><div class="qsi"><span class="qsn" id="qsT">0</span>Total</div><div class="qsi"><span class="qsn" id="qsP">—</span>Score</div><div class="qsi"><span class="qsn">'+(LEVELS[cLvl].unlockScore||'—')+'%</span>Seuil</div></div><div class="qcard"><div class="qq" id="qQ" style="direction:rtl;font-size:21px"></div><div class="qopts" id="qO"></div></div><p style="text-align:center;font-size:12px;color:#666;margin-top:.35rem" id="qFB"></p>';
  nextQ();
}
function nextQ(){
  var v=LEVELS[cLvl].vocab,i=Math.floor(Math.random()*v.length),c=v[i];
  curAns=c.fr;
  var q=document.getElementById('qQ');if(q)q.textContent=c.ar;
  var pool=v.filter(function(_,j){return j!==i;}).sort(function(){return Math.random()-.5;}).slice(0,3).map(function(x){return x.fr;});
  var opts=[c.fr].concat(pool).sort(function(){return Math.random()-.5;});
  var o=document.getElementById('qO');
  if(o)o.innerHTML=opts.map(function(op){return '<button class="qopt" onclick="checkQ(this,\''+op.replace(/'/g,'&#39;')+'\')">'+op+'</button>';}).join('');
  var f=document.getElementById('qFB');if(f)f.textContent='';
}
function checkQ(btn,ans){
  document.querySelectorAll('.qopt').forEach(function(b){b.disabled=true;});qT++;
  if(ans===curAns){btn.classList.add('correct');qC++;document.getElementById('qFB').textContent='✓ Bravo !';}
  else{btn.classList.add('wrong');document.querySelectorAll('.qopt').forEach(function(b){if(b.textContent===curAns)b.classList.add('correct');});document.getElementById('qFB').textContent='✗ Réponse : '+curAns;}
  var p=Math.round(qC/qT*100);
  document.getElementById('qsC').textContent=qC;document.getElementById('qsT').textContent=qT;document.getElementById('qsP').textContent=p+'%';
  scores[cLvl]=p;save();renderLevelHeader();
  var nd=LEVELS[cLvl].unlockScore,nx=cLvl+1;
  if(nd&&p>=nd&&nx<LEVELS.length&&!unlocked[nx]&&qT>=5){unlocked[nx]=true;save();setTimeout(function(){showToast('🎉 Niveau '+LEVELS[nx].name+' débloqué !');},200);setTimeout(renderLevelBar,300);}
  setTimeout(nextQ,1400);
}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3200);}

renderLevelBar();renderLevelHeader();renderAlphabet();

</script>
